services:
  moneyben:
    build: .
    container_name: moneyben
    restart: unless-stopped
    # Give the app time to finish a cycle cleanly before Docker force-kills it.
    stop_grace_period: 45s
    env_file:
      - .env
    environment:
      DATA_DIR: /data
    volumes:
      - ./data:/data
    # Trading needs no inbound ports. Logs via `docker compose logs -f`.
