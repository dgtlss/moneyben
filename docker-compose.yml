services:
  moneyben:
    build: .
    container_name: moneyben
    restart: unless-stopped
    # Give the shutdown cash-out (sell all positions) time to finish before
    # Docker force-kills the container.
    stop_grace_period: 45s
    env_file:
      - .env
    environment:
      DATA_DIR: /data
    volumes:
      - ./data:/data
    # Trading needs no inbound ports. Logs via `docker compose logs -f`.
